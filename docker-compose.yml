version: "3.8"

services:
  # 1. Database (PostgreSQL 17 - Bản ổn định, tương thích mọi ORM)
  db:
    image: postgres:17-alpine
    container_name: fai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456789
      POSTGRES_DB: fai_lab_db
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  # Redis (Bắt buộc cho Hàng đợi BullMQ)
  redis:
    image: redis:7-alpine
    container_name: fai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 2. Backend (Node.js 22 LTS với Chromium cho Puppeteer)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fai_backend
    restart: unless-stopped
    working_dir: /app
    shm_size: '1gb'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
    volumes:
      - ./backend:/app 
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:123456789@db:5432/fai_lab_db?schema=public
      - JWT_SECRET=my_super_secret_jwt_key_123
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio
      - MINIO_PUBLIC_ENDPOINT=localhost
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=requests
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
    command: npm run dev
    depends_on:
      - db
      - redis
      - minio

  # 3. Frontend (Vue.js với Node 22 LTS)
  frontend:
    image: node:22-alpine
    container_name: fai_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app:rw
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

  # 4. MinIO (S3 Compatible Object Storage)
  minio:
    image: minio/minio:latest
    container_name: fai_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # 5. MinIO Init (Create Bucket)
  minio-init:
    image: minio/mc:latest
    container_name: fai_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      /usr/bin/mc mb myminio/requests || true;
      "

volumes:
  pg_data:
  redis_data:
  minio_data:
